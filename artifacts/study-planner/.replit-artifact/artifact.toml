kind = "web"
previewPath = "/"
title = "Study Planner"
version = "1.0.0"
id = "artifacts/study-planner"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18986

[services.development]
run = "pnpm --filter @workspace/study-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-planner", "run", "build" ]
serve = "static"
publicDir = "artifacts/study-planner/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18986"
BASE_PATH = "/"
